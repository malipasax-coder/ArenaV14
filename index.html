<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA V14 | ULTIMATE E-SPORTS CEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    </head>
<body>
    <script>
        // GÜVENLİK KORUMALARI
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // FIREBASE CONFIG (Senin Bilgilerin)
        const firebaseConfig = { 
            apiKey: "AIzaSyCpBrkM6Yh__FXhc8aznEp1G2AqMgxr_iE", 
            authDomain: "arenav14-8ad95.firebaseapp.com", 
            projectId: "arenav14-8ad95", 
            storageBucket: "arenav14-8ad95.firebasestorage.app", 
            messagingSenderId: "818899825621", 
            appId: "1:818899825621:web:a51cd631c943863fcb435c", 
            databaseURL: "https://arenav14-8ad95-default-rtdb.firebaseio.com" 
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserUid = null;
        let userData = {};
        let isAdmin = false;

        // SAYFA YÖNETİMİ (Stabilize Edildi)
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // GİRİŞ YAP (Hata düzeltildi)
        async function handleLogin() {
            const email = document.getElementById('l-email').value.trim();
            const pass = document.getElementById('l-pass').value;
            
            if(!email || !pass) return alert("E-posta ve şifre girin!");

            try {
                // E-posta formatı kontrolü
                const finalEmail = email.includes('@') ? email : email + "@arena.v14";
                await auth.signInWithEmailAndPassword(finalEmail, pass);
                // Auth tetikleyicisi otomatik yönlendirecek
            } catch (err) {
                alert("Giriş Hatası: " + err.message);
            }
        }

        // KAYIT OL (Yapı korundu)
        async function handleRegister() {
            const n = document.getElementById('r-name').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            const t = document.getElementById('r-terms').checked;
            
            if(!n || !e || p.length < 6 || !t) return alert("Eksik bilgi veya 6 haneden kısa şifre!");

            try {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                const rc = Math.random().toString(36).substring(7).toUpperCase();
                await db.ref('users/' + res.user.uid).set({
                    username: n, email: e, diamonds: 0, wagerNeeded: 0, xp: 0, 
                    status: 'active', refCode: rc, role: 'user', tasks: { date: new Date().toDateString() }
                });
                alert("Başarıyla kayıt oldunuz!");
                toggleAuthMode('login');
            } catch (err) {
                alert("Kayıt Hatası: " + err.message);
            }
        }

        // OTURUM DİNLEYİCİ (Sistemin kalbi)
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUserUid = user.uid;
                db.ref('users/' + user.uid).once('value', s => {
                    const data = s.val();
                    if(data && data.status === 'banned') {
                        auth.signOut();
                        return alert("Hesabınız yasaklanmıştır.");
                    }
                    if(data && (data.role === 'admin' || data.role === 'mod')) {
                        isAdmin = true;
                        startAdmin();
                    } else {
                        isAdmin = false;
                        startLobby();
                    }
                });
            } else {
                showPage('auth-page');
            }
        });

        // LOBİ BAŞLAT (Veri bağlama hataları giderildi)
        function startLobby() {
            showPage('lobby-page');
            
            // Kullanıcı Verilerini Dinle
            db.ref('users/' + currentUserUid).on('value', s => {
                userData = s.val();
                if(!userData) return;

                // UI Güncelleme
                const dispName = document.getElementById('display-name');
                if(dispName) {
                    dispName.innerText = userData.username;
                    dispName.style.color = userData.chatColor || 'white';
                }
                
                const diamonds = document.getElementById('user-diamonds');
                if(diamonds) diamonds.innerText = (userData.diamonds || 0).toLocaleString() + " 💎";
                
                // Seviye ve XP
                const l = getLevelInfo(userData.xp || 0);
                const leagueTxt = document.getElementById('player-league-text');
                if(leagueTxt) leagueTxt.innerHTML = `SEVİYE ${l.level} | <span class="${l.color}">${l.league}</span>`;
            });

            // Duyuruları Dinle
            db.ref('system/config/announcement').on('value', s => {
                const ann = document.getElementById('lobby-announcement');
                if(ann) ann.innerText = s.val() || "Arena V14'e Hoşgeldiniz!";
            });
        }

        // SEVİYE HESAPLAMA FONKSİYONU
        function getLevelInfo(xp) {
            let lvl = 1, req = 100;
            let tempXp = xp;
            while(tempXp >= req) { tempXp -= req; lvl++; req = lvl * 100; }
            return { level: lvl, league: "BRONZ LİG", color: "text-orange-400" }; // Basitleştirilmiş versiyon
        }

        // ÇIKIŞ
        function logout() { auth.signOut().then(() => location.reload()); }

        // Modal Kapatma Desteği (Esc Tuşu)
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
