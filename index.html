<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA V14 | PROFESSIONAL OWNER SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .page { position: fixed; inset: 0; padding: 1rem; overflow-y: auto; z-index: 10; padding-bottom: 80px; background: radial-gradient(circle at top, #0f172a 0%, #020617 100%); display: none; }
        .active { display: block !important; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9)); border-radius: 20px; padding: 1.25rem; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .input-field { width: 100%; background: rgba(0, 0, 0, 0.4); padding: 0.9rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; font-size: 14px; }
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; justify-content: center; items-center; }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div></div>

    <div id="auth-page" class="page flex flex-col justify-center items-center">
        <h1 class="text-4xl font-black font-orbitron text-blue-500 mb-8">ARENA V14</h1>
        <div class="glass p-6 rounded-3xl w-full max-w-xs">
            <input id="l-user" placeholder="E-posta veya Kullanıcı Adı" class="input-field mb-2">
            <input id="l-pass" type="password" placeholder="Şifre" class="input-field mb-4">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold mb-2 active:scale-95 transition">GİRİŞ YAP</button>
            <button onclick="handleRegister()" class="w-full border border-blue-500 text-blue-500 py-4 rounded-2xl font-bold active:scale-95 transition">YENİ KAYIT</button>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black font-orbitron text-purple-500">OWNER DASHBOARD</h1>
            <button onclick="logout()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="stat-card border-l-4 border-green-500">
                <p class="text-[10px] text-slate-400 font-bold uppercase">NET KÂR (KOMİSYON)</p>
                <h3 id="admin-sys-commission" class="text-xl font-black font-orbitron text-green-400">0 ₺</h3>
            </div>
            <div class="stat-card border-l-4 border-blue-500">
                <p class="text-[10px] text-slate-400 font-bold uppercase">TOPLAM ÜYE</p>
                <h3 id="admin-total-users" class="text-xl font-black font-orbitron text-blue-400">0</h3>
            </div>
        </div>

        <div class="stat-card mb-6">
            <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">ÜYE ARAMA VE YÖNETİM</h3>
            <div class="relative mb-4">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input id="user-search" oninput="filterUsers()" placeholder="İsim, E-posta veya ID ile ara..." class="input-field pl-12">
            </div>
            <div id="admin-users-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                </div>
        </div>

        <div class="stat-card border-orange-500/30">
            <h3 class="text-xs font-bold text-orange-400 mb-4 uppercase tracking-widest">BEKLEYEN ÇEKİM TALEPLERİ</h3>
            <div id="admin-withdraw-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="lobby-page" class="page">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black shadow-lg shadow-blue-500/30 text-xl">A</div>
                <div>
                    <h2 id="display-name" class="font-bold text-sm">...</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">PREMIUM USER</p>
                </div>
            </div>
            <button onclick="logout()" class="text-slate-500 glass w-10 h-10 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="stat-card mb-8 border-b-4 border-cyan-500 bg-cyan-500/5 py-12 text-center">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-2">Cüzdan Bakiyesi</p>
            <h1 id="user-diamonds" class="text-5xl font-black font-orbitron text-cyan-400">0 ₺</h1>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="alert('Yakında!')" class="stat-card text-center bg-emerald-500/5 border-emerald-500/20">
                <i class="fa-solid fa-money-bill-transfer text-emerald-500 text-2xl mb-2"></i>
                <p class="text-[10px] font-bold uppercase">PARA ÇEK</p>
            </button>
            <button onclick="alert('Yakında!')" class="stat-card text-center bg-blue-500/5 border-blue-500/20">
                <i class="fa-solid fa-wallet text-blue-500 text-2xl mb-2"></i>
                <p class="text-[10px] font-bold uppercase">BAKİYE YÜKLE</p>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpBrkM6Yh__FXhc8aznEp1G2AqMgxr_iE",
            authDomain: "arenav14-8ad95.firebaseapp.com",
            projectId: "arenav14-8ad95",
            storageBucket: "arenav14-8ad95.firebasestorage.app",
            messagingSenderId: "818899825621",
            appId: "1:818899825621:web:a51cd631c943863fcb435c",
            databaseURL: "https://arenav14-8ad95-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        
        let allUsers = {};
        let isAdmin = false;

        // --- AUTH ---
        function handleLogin() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "123456") { isAdmin = true; startAdmin(); return; }
            auth.signInWithEmailAndPassword(u.includes('@') ? u : u + "@a.v14", p)
                .then(() => startLobby())
                .catch(e => alert("Giriş Başarısız: " + e.message));
        }

        function handleRegister() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value;
            if(!u || p.length < 6) return alert("Geçerli bilgiler girin (Şifre min 6 hane)");
            auth.createUserWithEmailAndPassword(u + "@a.v14", p).then(r => {
                db.ref('users/' + r.user.uid).set({ username: u, diamonds: 1000, email: u + "@a.v14", joinDate: Date.now() });
                alert("Kayıt Başarılı! Giriş yapabilirsiniz.");
            }).catch(e => alert(e.message));
        }

        // --- ADMIN PANEL ---
        function startAdmin() {
            document.getElementById('loading-screen').style.display = 'none';
            showPage('admin-page');
            
            // Finansal Veri
            db.ref('system/accounting/commission').on('value', s => {
                document.getElementById('admin-sys-commission').innerText = (s.val() || 0).toLocaleString() + " ₺";
            });

            // Kullanıcıları Çek ve Dinle
            db.ref('users').on('value', s => {
                allUsers = s.val() || {};
                document.getElementById('admin-total-users').innerText = Object.keys(allUsers).length;
                renderUsers(allUsers);
            });
        }

        function renderUsers(usersObj) {
            let html = '';
            Object.keys(usersObj).forEach(uid => {
                const u = usersObj[uid];
                html += `
                <div class="stat-card bg-slate-800/40 flex flex-col gap-2 border-slate-700/50">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-black text-xs uppercase">${u.username}</p>
                            <p class="text-[9px] text-slate-500 font-mono">${u.email || 'E-posta Yok'}</p>
                        </div>
                        <p class="text-cyan-400 font-black text-sm">${(u.diamonds || 0).toLocaleString()} ₺</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateBalance('${uid}', 500)" class="flex-1 bg-green-600/20 text-green-500 py-2 rounded-xl text-[10px] font-bold">+500</button>
                        <button onclick="updateBalance('${uid}', -500)" class="flex-1 bg-red-600/20 text-red-500 py-2 rounded-xl text-[10px] font-bold">-500</button>
                        <button onclick="deleteUser('${uid}')" class="bg-slate-700 px-3 rounded-xl text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });
            document.getElementById('admin-users-list').innerHTML = html || '<p class="text-center text-xs text-slate-500">Üye bulunamadı.</p>';
        }

        function filterUsers() {
            const term = document.getElementById('user-search').value.toLowerCase();
            const filtered = {};
            Object.keys(allUsers).forEach(uid => {
                const u = allUsers[uid];
                if(u.username.toLowerCase().includes(term) || (u.email && u.email.toLowerCase().includes(term))) {
                    filtered[uid] = u;
                }
            });
            renderUsers(filtered);
        }

        function updateBalance(uid, amt) {
            db.ref('users/' + uid + '/diamonds').transaction(v => (v || 0) + amt);
        }

        function deleteUser(uid) {
            if(confirm("Bu üyeyi silmek istediğinize emin misiniz?")) db.ref('users/' + uid).remove();
        }

        // --- LOBBY ---
        function startLobby() {
            document.getElementById('loading-screen').style.display = 'none';
            const uid = auth.currentUser.uid;
            showPage('lobby-page');
            db.ref('users/' + uid).on('value', s => {
                const data = s.val();
                if(data) {
                    document.getElementById('display-name').innerText = data.username.toUpperCase();
                    document.getElementById('user-diamonds').innerText = (data.diamonds || 0).toLocaleString() + " ₺";
                }
            });
        }

        // --- CORE ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(u => {
            if(u && !isAdmin) startLobby();
            else if(!isAdmin) {
                document.getElementById('loading-screen').style.display = 'none';
                showPage('auth-page');
            }
        });
    </script>
</body>
</html>
