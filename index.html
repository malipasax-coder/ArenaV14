<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA V14 | BOSS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; user-select: none; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .page { position: fixed; inset: 0; padding: 1rem; overflow-y: auto; z-index: 10; padding-bottom: 80px; background: radial-gradient(circle at top, #0f172a 0%, #020617 100%); display: none; }
        .active { display: block !important; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9)); border-radius: 20px; padding: 1rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1rem; }
        .input-field { width: 100%; background: rgba(0, 0, 0, 0.4); padding: 0.8rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; margin-bottom: 0.5rem; }
        #toast-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; }
        .toast { padding: 10px; border-radius: 8px; margin-bottom: 5px; text-align: center; font-weight: bold; font-size: 12px; color: white; background: #2563eb; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="auth-page" class="page active flex flex-col justify-center items-center">
        <h1 class="text-3xl font-black font-orbitron text-blue-500 mb-6">ARENA V14</h1>
        <div class="glass p-6 rounded-3xl w-full max-w-xs">
            <input id="l-user" placeholder="Kullanıcı Adı" class="input-field">
            <input id="l-pass" type="password" placeholder="Şifre" class="input-field">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mb-2">GİRİŞ</button>
            <button onclick="handleRegister()" class="w-full border border-blue-500 text-blue-500 py-3 rounded-xl font-bold">KAYIT</button>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black font-orbitron text-purple-500">OWNER PANEL</h1>
            <button onclick="logout()" class="text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="stat-card">
                <p class="text-[8px] text-slate-400">KASA</p>
                <h3 id="admin-sys-commission" class="text-sm font-bold">0 ₺</h3>
            </div>
            <div class="stat-card">
                <p class="text-[8px] text-slate-400">ÜYE</p>
                <h3 id="admin-total-users" class="text-sm font-bold">0</h3>
            </div>
        </div>
        <div class="stat-card border-orange-500/30">
            <h3 class="text-xs font-bold text-orange-400 mb-2">ÇEKİM TALEPLERİ</h3>
            <div id="admin-withdraw-list" class="space-y-1"></div>
        </div>
        <div class="stat-card">
            <h3 class="text-xs font-bold text-blue-400 mb-2">OYUNCULAR</h3>
            <div id="admin-users-cards" class="space-y-2"></div>
        </div>
    </div>

    <div id="lobby-page" class="page">
        <div class="flex justify-between items-center mb-4">
            <h2 id="display-name" class="font-bold text-sm uppercase text-blue-400">...</h2>
            <button onclick="logout()" class="text-slate-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="stat-card text-center py-6 border-b-2 border-cyan-500">
            <p class="text-[10px] text-slate-400 mb-1">BAKİYE</p>
            <h1 id="user-diamonds" class="text-3xl font-black font-orbitron text-cyan-400">0 ₺</h1>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="showWithdrawModal()" class="stat-card text-center bg-emerald-500/10"><i class="fa-solid fa-receipt text-emerald-500"></i><p class="text-[10px] font-bold mt-1">PARA ÇEK</p></button>
            <button onclick="addDemoBalance()" class="stat-card text-center bg-blue-500/10"><i class="fa-solid fa-plus text-blue-500"></i><p class="text-[10px] font-bold mt-1">KASA YÜKLE</p></button>
        </div>
        <div id="rooms-list" class="space-y-2"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpBrkM6Yh__FXhc8aznEp1G2AqMgxr_iE",
            authDomain: "arenav14-8ad95.firebaseapp.com",
            projectId: "arenav14-8ad95",
            storageBucket: "arenav14-8ad95.firebasestorage.app",
            messagingSenderId: "818899825621",
            appId: "1:818899825621:web:a51cd631c943863fcb435c",
            databaseURL: "https://arenav14-8ad95-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let currentUserUid = null, userData = {}, isAdmin = false;

        function showToast(m) {
            const el = document.createElement('div'); el.className = 'toast'; el.innerText = m;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "123456") { isAdmin = true; startAdmin(); return; }
            auth.signInWithEmailAndPassword(u + "@a.v14", p).then(() => startLobby()).catch(() => showToast("Hatalı Giriş!"));
        }

        function handleRegister() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if(!u || !p) return showToast("Boş bırakma!");
            auth.createUserWithEmailAndPassword(u + "@a.v14", p).then(r => {
                db.ref('users/' + r.user.uid).set({ username: u, diamonds: 1000, wins: 0, losses: 0, status: 'active' });
                showToast("Kayıt Başarılı!");
            }).catch(e => showToast("Kayıt Hatası!"));
        }

        function startAdmin() {
            showPage('admin-page');
            db.ref('system/accounting/commission').on('value', s => document.getElementById('admin-sys-commission').innerText = (s.val() || 0) + " ₺");
            db.ref('users').on('value', s => {
                document.getElementById('admin-total-users').innerText = s.numChildren();
                let h = ''; s.forEach(c => {
                    const u = c.val();
                    h += `<div class="stat-card flex justify-between items-center text-[10px]">
                        <span><b>${u.username}</b></span>
                        <div class="flex gap-1 items-center">
                            <span>${u.diamonds} ₺</span>
                            <button onclick="db.ref('users/${c.key}/diamonds').transaction(v=>v+500)" class="bg-green-600 p-1 rounded">+500</button>
                        </div>
                    </div>`;
                });
                document.getElementById('admin-users-cards').innerHTML = h;
            });
        }

        function startLobby() {
            currentUserUid = auth.currentUser.uid;
            showPage('lobby-page');
            db.ref('users/' + currentUserUid).on('value', s => {
                userData = s.val(); if(!userData) return;
                document.getElementById('display-name').innerText = userData.username;
                document.getElementById('user-diamonds').innerText = userData.diamonds.toLocaleString() + " ₺";
            });
            db.ref('system/rooms').on('value', s => {
                let h = ''; s.forEach(c => {
                    const r = c.val();
                    h += `<div class="stat-card flex justify-between items-center border-l-4 border-blue-500">
                        <span class="text-xs font-bold">${r.name}</span>
                        <span class="text-[10px]">${r.entryFee} ₺</span>
                    </div>`;
                });
                document.getElementById('rooms-list').innerHTML = h || '<p class="text-center text-[10px] text-slate-500">Oda bekleniyor...</p>';
            });
        }

        function addDemoBalance() { db.ref('users/' + currentUserUid + '/diamonds').transaction(v => v + 1000); showToast("1.000 ₺ Yüklendi!"); }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(u => {
            if (u && !isAdmin) startLobby();
            else if (!isAdmin) showPage('auth-page');
        });
    </script>
</body>
</html>
