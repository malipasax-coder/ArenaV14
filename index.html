<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA V14 | ULTIMATE E-SPORTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #020617; color: white; overflow: hidden; font-family: 'Inter', sans-serif; user-select: none; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .page { position: absolute; inset: 0; padding: 1.5rem; overflow-y: auto; background: radial-gradient(circle at top, #0f172a 0%, #020617 100%); display: none; }
        .active { display: block !important; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9)); border-radius: 20px; padding: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .input-field { width: 100%; background: rgba(0, 0, 0, 0.5); padding: 0.9rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; font-size: 14px; }
        
        /* Oyun Alanı ve Hedefler */
        #game-area { position: relative; width: 100%; height: 50vh; background: rgba(0,0,0,0.6); border-radius: 24px; border: 2px solid #1e293b; overflow: hidden; margin-top: 10px; box-shadow: inset 0 0 30px rgba(0,0,0,0.9); }
        .target { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, #60a5fa, #2563eb); border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 20px #3b82f6; transform: scale(0); animation: pop 0.2s forwards; cursor: pointer; }
        /* Altın Hedef Tasarımı (3 Puan) */
        .target.golden { background: radial-gradient(circle, #fde047, #ca8a04); border-color: #fef08a; box-shadow: 0 0 30px #eab308; width: 40px; height: 40px; z-index: 5; }
        @keyframes pop { to { transform: scale(1); } }
        
        /* Modal Tasarımları */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; }
        .modal.flex { display: flex !important; }
        .chat-box { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .chat-msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; font-size: 12px; width: fit-content; max-width: 90%; }
        .chat-msg.me { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.3); align-self: flex-end; }
    </style>
</head>
<body>

    <div id="auth-page" class="page active flex flex-col justify-center items-center">
        <h1 class="text-4xl font-black font-orbitron text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600 mb-8 tracking-tighter drop-shadow-lg">ARENA V14</h1>
        <div class="glass p-6 rounded-3xl w-full max-w-sm shadow-2xl">
            <input id="l-user" placeholder="Kullanıcı Adı" class="input-field mb-3">
            <input id="l-pass" type="password" placeholder="Şifre" class="input-field mb-6">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black mb-3 active:scale-95 transition-all text-sm tracking-widest">GİRİŞ YAP</button>
            <button onclick="handleRegister()" class="w-full border-2 border-blue-500/50 text-blue-400 py-4 rounded-2xl font-black active:scale-95 transition-all text-sm tracking-widest">YENİ KAYIT</button>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black font-orbitron text-purple-500 uppercase"><i class="fa-solid fa-chess-king mr-2"></i>Patron Paneli</h1>
            <button onclick="logout()" class="w-10 h-10 glass rounded-full text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="stat-card border-l-4 border-green-500">
                <p class="text-[9px] text-slate-400 font-bold mb-1">SİSTEM KASASI</p>
                <h3 id="admin-sys-commission" class="text-lg font-black font-orbitron text-green-400">0 ₺</h3>
            </div>
            <div class="stat-card border-l-4 border-blue-500">
                <p class="text-[9px] text-slate-400 font-bold mb-1">TOPLAM ÜYE</p>
                <h3 id="admin-total-users" class="text-lg font-black font-orbitron text-blue-400">0</h3>
            </div>
        </div>

        <div class="stat-card border-purple-500/30 mb-4">
            <h3 class="text-xs font-bold text-purple-400 mb-3 uppercase tracking-widest">Sistem Özellikleri</h3>
            <div class="flex gap-2 mb-2">
                <input id="admin-daily-amount" type="number" placeholder="Günlük Ödül (₺)" class="input-field mb-0 text-xs">
                <button onclick="updateDailyReward()" class="bg-purple-600 px-4 rounded-xl text-[10px] font-bold">KAYDET</button>
            </div>
            <button onclick="clearChat()" class="w-full bg-red-600/20 text-red-500 py-3 rounded-xl text-[10px] font-bold border border-red-500/30"><i class="fa-solid fa-broom mr-2"></i>GLOBAL SOHBETİ TEMİZLE</button>
        </div>

        <div class="stat-card mb-4">
            <input id="user-search" oninput="filterUsers()" placeholder="Üye Ara (İsim ile)..." class="input-field mb-4">
            <div id="admin-users-list" class="space-y-3 max-h-[250px] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div id="lobby-page" class="page">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center font-black shadow-lg shadow-blue-500/30 text-xl" id="avatar-letter">A</div>
                <div>
                    <h2 id="display-name" class="font-bold text-sm uppercase">...</h2>
                    <p class="text-[9px] text-slate-400 font-bold"><i class="fa-solid fa-trophy text-yellow-500 mr-1"></i>V14 OYUNCUSU</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="openModal('chat-modal')" class="w-10 h-10 glass rounded-xl text-blue-400 relative">
                    <i class="fa-solid fa-message"></i><span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                </button>
                <button onclick="logout()" class="w-10 h-10 glass rounded-xl text-slate-500"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
        
        <div class="stat-card mb-6 border-b-4 border-cyan-500 bg-cyan-500/5 py-8 text-center relative overflow-hidden">
            <i class="fa-solid fa-wallet absolute text-6xl opacity-5 -right-2 -bottom-2 text-cyan-400"></i>
            <p class="text-[10px] text-slate-400 font-black mb-2 tracking-[0.2em]">CÜZDAN</p>
            <h1 id="user-diamonds" class="text-4xl font-black font-orbitron text-cyan-400 drop-shadow-md">0 ₺</h1>
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="claimDailyReward()" class="stat-card flex flex-col items-center justify-center bg-yellow-500/10 border-yellow-500/20 active:scale-95 transition-all p-3">
                <i class="fa-solid fa-gift text-yellow-500 text-xl mb-1"></i>
                <p class="text-[8px] font-bold text-center">GÜNLÜK<br>ÖDÜL</p>
            </button>
            <button onclick="openModal('leaderboard-modal')" class="stat-card flex flex-col items-center justify-center bg-purple-500/10 border-purple-500/20 active:scale-95 transition-all p-3">
                <i class="fa-solid fa-crown text-purple-500 text-xl mb-1"></i>
                <p class="text-[8px] font-bold text-center">TOP 10<br>LİDERLER</p>
            </button>
            <button onclick="db.ref('users/'+currentUserUid+'/diamonds').transaction(v=>v+500)" class="stat-card flex flex-col items-center justify-center bg-blue-500/10 border-blue-500/20 active:scale-95 transition-all p-3">
                <i class="fa-solid fa-plus text-blue-500 text-xl mb-1"></i>
                <p class="text-[8px] font-bold text-center">BAKİYE<br>EKLE</p>
            </button>
        </div>
        
        <h3 class="text-slate-400 font-black text-[10px] mb-3 tracking-widest uppercase flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> CANLI ARENALAR
        </h3>
        <div id="rooms-list" class="space-y-3"></div>
    </div>

    <div id="chat-modal" class="modal">
        <div class="glass w-full max-w-sm rounded-3xl p-4 border-blue-500/30 flex flex-col h-[80vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black font-orbitron text-blue-400"><i class="fa-solid fa-globe mr-2"></i>GLOBAL SOHBET</h2>
                <button onclick="closeModal('chat-modal')" class="text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="chat-messages" class="chat-box flex-1"></div>
            <div class="flex gap-2 mt-2">
                <input id="chat-input" placeholder="Mesaj yaz..." class="input-field mb-0 text-xs">

    <div id="leaderboard-modal" class="modal">
        <div class="glass w-full max-w-sm rounded-3xl p-6 border-yellow-500/30">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black font-orbitron text-yellow-400"><i class="fa-solid fa-crown mr-2"></i>ZENGİNLER LİSTESİ</h2>
                <button onclick="closeModal('leaderboard-modal')" class="text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="leaderboard-list" class="space-y-2"></div>
        </div>
    </div>

    <div id="matchmaking-overlay" class="modal">
        <div class="w-24 h-24 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-6"></div>
        <h2 class="text-2xl font-black font-orbitron mb-2 tracking-widest">ARANIYOR...</h2>
        <p id="match-room-info" class="text-blue-400 text-xs font-bold mb-10 uppercase tracking-widest"></p>
        <button onclick="cancelMatchmaking()" class="glass border-red-500/30 text-red-500 px-12 py-4 rounded-2xl font-black text-xs">İPTAL ET</button>
    </div>

    <div id="game-page" class="page hidden-page flex-col">
        <div class="flex justify-between items-center mb-4 glass p-4 rounded-3xl w-full">
            <div class="text-center w-1/3">
                <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-1">Sen</p>
                <span id="my-score" class="text-4xl font-black text-white drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">0</span>
            </div>
            <div class="text-center w-1/3 border-x border-slate-700/50">
                <p class="text-[9px] font-bold text-red-500 uppercase tracking-widest mb-1">Süre</p>
                <span id="game-time" class="text-3xl font-orbitron">30</span>
            </div>
            <div class="text-center w-1/3">
                <p id="opp-name" class="text-[9px] font-bold text-red-400 uppercase tracking-widest mb-1">Rakip</p>
                <span id="opp-score" class="text-4xl font-black text-white">0</span>
            </div>
        </div>
        <div id="game-area"></div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCpBrkM6Yh__FXhc8aznEp1G2AqMgxr_iE",
            authDomain: "arenav14-8ad95.firebaseapp.com",
            projectId: "arenav14-8ad95",
            storageBucket: "arenav14-8ad95.firebasestorage.app",
            messagingSenderId: "818899825621",
            appId: "1:818899825621:web:a51cd631c943863fcb435c",
            databaseURL: "https://arenav14-8ad95-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        
        let currentUserUid = null, userData = {}, isAdmin = false, allUsers = {};
        let gameInterval, targetInterval, timeLeft = 30, currentGameId = null, myKey = null, currentMatchRoom = null;
        let systemDailyReward = 50; // Varsayılan ödül

        // --- AUDIO ENGINE (SES EFEKTLERİ) ---
        let audioCtx;
        function initAudio() {
            if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSfx(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'hit') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'gold') {
                osc.type = 'square'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'start') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // --- UI UTILS ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'game-page') document.getElementById('game-page').style.display = 'flex';
        }
        function openModal(id) { document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.remove('flex'); }

        // --- AUTH ---
        function handleLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "123456") { isAdmin = true; startAdmin(); return; }
            auth.signInWithEmailAndPassword(u + "@a.v14", p).then(() => startLobby()).catch(() => alert("Kullanıcı adı veya şifre hatalı!"));
        }
        function handleRegister() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if(!u || p.length < 6) return alert("Kullanıcı adı girin (Şifre min 6 hane)!");
            auth.createUserWithEmailAndPassword(u + "@a.v14", p).then(r => {
                db.ref('users/' + r.user.uid).set({ username: u, diamonds: 1000, wins: 0, status: 'active', lastReward: "" });
                alert("Kayıt Başarılı! Giriş yapabilirsiniz.");
            }).catch(e => alert("Kayıt Hatası!"));
        }

        // --- OWNER PANEL ---
        function startAdmin() {
            showPage('admin-page');
            db.ref('system/accounting/commission').on('value', s => document.getElementById('admin-sys-commission').innerText = (s.val() || 0).toLocaleString() + " ₺");
            db.ref('system/config/dailyReward').on('value', s => { systemDailyReward = s.val() || 50; document.getElementById('admin-daily-amount').value = systemDailyReward; });
            db.ref('users').on('value', s => {
                allUsers = s.val() || {};
                document.getElementById('admin-total-users').innerText = Object.keys(allUsers).length;
                renderUsers(allUsers);
            });
        }
        function updateDailyReward() {
            const amt = parseInt(document.getElementById('admin-daily-amount').value);
            if(amt) { db.ref('system/config/dailyReward').set(amt); alert("Günlük Ödül Güncellendi!"); }
        }
        function clearChat() { if(confirm("Tüm sohbet silinecek?")) db.ref('system/chat').remove(); }
        function renderUsers(obj) {
            let h = '';
            Object.keys(obj).forEach(uid => {
                const u = obj[uid];
                h += `<div class="stat-card bg-slate-800/40 mb-2 flex justify-between items-center text-xs">
                    <span class="font-black uppercase">${u.username}</span>
                    <div class="flex gap-2 items-center">
                        <span class="text-cyan-400 font-bold">${(u.diamonds||0)} ₺</span>
                        <button onclick="db.ref('users/${uid}/diamonds').transaction(v=>(v||0)+500)" class="bg-green-600 px-2 py-1 rounded">+500</button>
                    </div>
                </div>`;
            });
            document.getElementById('admin-users-list').innerHTML = h;
        }
        function filterUsers() {
            const t = document.getElementById('user-search').value.toLowerCase();
            const f = {}; Object.keys(allUsers).forEach(k => { if(allUsers[k].username.toLowerCase().includes(t)) f[k] = allUsers[k]; });
            renderUsers(f);
        }

        // --- LOBBY, CHAT, REWARD, LEADERBOARD ---
        function startLobby() {
            currentUserUid = auth.currentUser.uid;
            showPage('lobby-page');
            
            db.ref('system/config/dailyReward').on('value', s => { systemDailyReward = s.val() || 50; });
            
            db.ref('users/' + currentUserUid).on('value', s => {
                userData = s.val();
                if(userData) {
                    document.getElementById('display-name').innerText = userData.username;
                    document.getElementById('avatar-letter').innerText = userData.username.charAt(0).toUpperCase();
                    document.getElementById('user-diamonds').innerText = (userData.diamonds||0).toLocaleString() + " ₺";
                }
            });

            // Odaları Yükle
            const defaultRooms = { "r1": { name: "ACEMİ ARENASI", entryFee: 100, reward: 180 }, "r2": { name: "PROFESYONEL", entryFee: 500, reward: 900 }, "r3": { name: "ELİTE 1V1", entryFee: 1000, reward: 1850 } };
            db.ref('system/rooms').set(defaultRooms);
            db.ref('system/rooms').on('value', s => {
                let h = ''; s.forEach(c => {
                    const r = c.val();
                    h += `<div onclick="joinMatch('${c.key}', ${r.entryFee}, ${r.reward}, '${r.name}')" class="stat-card border-l-4 border-blue-600 flex justify-between items-center active:scale-95 transition-all cursor-pointer">
                        <div><p class="font-black text-sm mb-1">${r.name}</p><p class="text-[10px] text-slate-400 font-bold">Giriş: ${r.entryFee} ₺ | Ödül: ${r.reward} ₺</p></div>
                        <div class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center"><i class="fa-solid fa-play text-blue-500"></i></div>
                    </div>`;
                });
                document.getElementById('rooms-list').innerHTML = h;
            });

            // Chat Dinleyici
            db.ref('system/chat').limitToLast(30).on('value', s => {
                const box = document.getElementById('chat-messages');
                let h = '';
                s.forEach(c => {
                    const msg = c.val();
                    const isMe = msg.uid === currentUserUid;
                    h += `<div class="chat-msg ${isMe ? 'me' : ''}"><span class="font-bold text-[9px] text-${isMe?'blue':'purple'}-400 uppercase">${msg.name}</span><br>${msg.text}</div>`;
                });
                box.innerHTML = h;
                box.scrollTop = box.scrollHeight;
            });

            // Leaderboard Dinleyici (En Zengin 10 Kişi)
            db.ref('users').orderByChild('diamonds').limitToLast(10).on('value', s => {
                let arr = []; s.forEach(c => { arr.push(c.val()); });
                arr.reverse(); // En yüksek en üste
                let h = '';
                arr.forEach((u, i) => {
                    let color = i===0 ? 'text-yellow-400' : (i===1 ? 'text-slate-300' : (i===2 ? 'text-orange-400' : 'text-white'));
                    h += `<div class="stat-card bg-slate-800/50 mb-2 flex justify-between items-center border-l-4 border-slate-600">
                        <div class="flex items-center gap-3"><span class="font-black ${color} text-lg">#${i+1}</span><span class="font-bold text-xs uppercase">${u.username}</span></div>
                        <span class="text-cyan-400 font-black text-xs">${(u.diamonds||0).toLocaleString()} ₺</span>
                    </div>`;
                });
                document.getElementById('leaderboard-list').innerHTML = h;
            });

            db.ref(`system/active_players/${currentUserUid}/game`).on('value', s => { if(s.val()) startGame(s.val()); });
        }

        function claimDailyReward() {
            const today = new Date().toDateString();
            if(userData.lastReward === today) return alert("Bugünlük ödülünü zaten aldın. Yarın tekrar gel!");
            db.ref(`users/${currentUserUid}/diamonds`).transaction(v => (v||0) + systemDailyReward);
            db.ref(`users/${currentUserUid}/lastReward`).set(today);
            alert(`🎁 TEBRİKLER! ${systemDailyReward} ₺ Günlük Ödül Kasana Eklendi.`);
        }

        function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim();
            if(txt) {
                db.ref('system/chat').push({ uid: currentUserUid, name: userData.username, text: txt, time: Date.now() });
                inp.value = '';
            }
        }

        // --- MATCHMAKING & GAME ---
        function joinMatch(rid, entry, reward, name) {
            initAudio(); // Ses motorunu başlat
            if(!userData || userData.diamonds < entry) return alert("Bakiye Yetersiz!");
            currentMatchRoom = { rid, entry };
            document.getElementById('match-room-info').innerText = name;
            openModal('matchmaking-overlay');

            db.ref(`system/matchmaking/${rid}`).transaction(cur => {
                if(!cur) return { uid: currentUserUid, name: userData.username, status: 'waiting', entry, reward };
                if(cur.status === 'waiting' && cur.uid !== currentUserUid) {
                    cur.status = 'matched'; cur.p2 = { uid: currentUserUid, name: userData.username }; return cur;
                } return;
            }, (err, comm, snap) => {
                if(comm && snap.val()?.status === 'matched' && snap.val().p2.uid === currentUserUid) {
                    const gid = 'g_'+Date.now(); const d = snap.val();
                    db.ref(`system/games/${gid}`).set({ p1: d.uid, p1Name: d.name, p1Score: 0, p2: d.p2.uid, p2Name: d.p2.name, p2Score: 0, entry, reward, status: 'playing' }).then(() => {
                        db.ref(`system/active_players/${d.uid}/game`).set(gid);
                        db.ref(`system/active_players/${d.p2.uid}/game`).set(gid);
                        db.ref(`system/matchmaking/${rid}`).remove();
                    });
                }
            });
        }

        function cancelMatchmaking() { db.ref(`system/matchmaking/${currentMatchRoom.rid}`).remove(); closeModal('matchmaking-overlay'); }

        function startGame(gid) {
            playSfx('start'); // Oyun başlama sesi
            currentGameId = gid;
            closeModal('matchmaking-overlay');
            showPage('game-page');
            document.getElementById('game-area').innerHTML = "";
            timeLeft = 30;
            
            db.ref(`system/games/${gid}`).on('value', s => {
                const g = s.val(); if(!g) return;
                myKey = (currentUserUid === g.p1) ? 'p1Score' : 'p2Score';
                document.getElementById('my-score').innerText = g[myKey];
                document.getElementById('opp-score').innerText = (myKey === 'p1Score') ? g.p2Score : g.p1Score;
                document.getElementById('opp-name').innerText = (myKey === 'p1Score') ? g.p2Name : g.p1Name;
            });

            gameInterval = setInterval(() => {
                timeLeft--; document.getElementById('game-time').innerText = timeLeft;
                if(timeLeft <= 0) finishGame();
            }, 1000);
            targetInterval = setInterval(spawn, 600); // Hedefler biraz daha hızlandı!
        }

        function spawn() {
            const a = document.getElementById('game-area');
            const t = document.createElement('div');
            
            // %15 İhtimalle Altın Hedef Çıkar
            const isGold = Math.random() < 0.15;
            t.className = isGold ? 'target golden' : 'target';
            
            const safeWidth = a.clientWidth - 70;
            const safeHeight = a.clientHeight - 70;
            t.style.left = Math.max(10, Math.random() * safeWidth) + 'px';
            t.style.top = Math.max(10, Math.random() * safeHeight) + 'px';
            
            const hitLogic = (e) => { 
                e.preventDefault(); 
                playSfx(isGold ? 'gold' : 'hit'); // Vuruş sesi
                db.ref(`system/games/${currentGameId}/${myKey}`).transaction(v => v + (isGold ? 3 : 1)); // Puan ekle
                t.remove(); 
            };
            
            t.onmousedown = hitLogic; t.ontouchstart = hitLogic;
            a.appendChild(t);
            
            // Altın hedef daha hızlı kaybolur (Zorluk)
            setTimeout(() => t.remove(), isGold ? 700 : 900);
        }

        function finishGame() {
            clearInterval(gameInterval); clearInterval(targetInterval);
            db.ref(`system/games/${currentGameId}`).once('value', s => {
                const g = s.val(); if(!g) return;
                const myS = g[myKey], oppS = (myKey === 'p1Score') ? g.p2Score : g.p1Score;
                const cut = (g.entry * 2) - g.reward;

                db.ref(`users/${currentUserUid}/diamonds`).transaction(cur => {
                    if(myS > oppS) return cur - g.entry + g.reward;
                    if(myS < oppS) return cur - g.entry;
                    return cur;
                });

                if(myS > oppS) {
                    alert("🏆 TEBRİKLER! KAZANDIN.");
                    db.ref('system/accounting/commission').transaction(v => (v || 0) + cut);
                } else if(myS < oppS) {
                    alert("💥 KAYBETTİN!");
                    db.ref('system/accounting/commission').transaction(v => (v || 0) + cut);
                } else {
                    alert("🤝 BERABERE!");
                }
                db.ref(`system/active_players/${currentUserUid}/game`).remove();
                setTimeout(() => showPage('lobby-page'), 2000);
            });
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        auth.onAuthStateChanged(u => { if(u && !isAdmin) startLobby(); else if(!isAdmin) showPage('auth-page'); });
    </script>
</body>
</html>
