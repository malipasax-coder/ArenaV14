<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA V14 | BLACK OPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .page { position: absolute; inset: 0; padding: 20px; display: none; background: #000; }
        .active { display: block !important; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 15px; }
        .input-field { width: 100%; background: #111; border: 1px solid #222; padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: #0066ff; color: #fff; }
        .btn-blue:active { background: #0052cc; transform: scale(0.98); }
        
        /* Game Area */
        #game-area { position: relative; width: 100%; height: 50vh; background: #050505; border: 2px solid #111; border-radius: 15px; overflow: hidden; margin-top: 15px; }
        .target { position: absolute; width: 50px; height: 50px; background: #0066ff; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 15px #0066ff; cursor: pointer; }
        .target.golden { background: #ffcc00; box-shadow: 0 0 15px #ffcc00; width: 40px; height: 40px; }
        
        /* Matchmaking Overlay */
        #match-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .loader { width: 50px; height: 50px; border: 5px solid #111; border-top-color: #0066ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast-container" class="fixed top-5 left-0 right-0 z-[200] flex flex-col items-center gap-2"></div>

    <div id="auth-page" class="page active flex flex-col justify-center">
        <h1 class="text-4xl font-black text-center mb-10 tracking-tighter">ARENA <span class="text-blue-600">V14</span></h1>
        <div class="card">
            <input id="l-email" placeholder="E-Posta" class="input-field">
            <input id="l-pass" type="password" placeholder="Şifre" class="input-field">
            <button onclick="handleLogin()" class="btn btn-blue">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="lobby-page" class="page">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p id="display-name" class="text-xs font-bold text-gray-500 uppercase">YÜKLENİYOR...</p>
                <p id="user-diamonds" class="text-3xl font-black text-blue-500">0 💎</p>
            </div>
            <button onclick="logout()" class="text-gray-600 text-2xl"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="openModal('deposit-modal')" class="card text-center border-blue-900/30">
                <i class="fa-solid fa-plus text-blue-500 mb-1"></i>
                <p class="text-[10px] font-bold">YÜKLE</p>
            </button>
            <button onclick="showToast('Sadece kapalı saatlerde çekim yapılır','error')" class="card text-center">
                <i class="fa-solid fa-minus text-gray-500 mb-1"></i>
                <p class="text-[10px] font-bold">BOZDUR</p>
            </button>
        </div>

        <p class="text-[10px] font-black text-gray-600 mb-4 tracking-widest uppercase">Aktif Odalar</p>
        <div id="rooms-list" class="space-y-3"></div>
    </div>

    <div id="match-overlay">
        <div class="loader mb-6"></div>
        <h2 class="text-xl font-black uppercase tracking-widest">Rakip Aranıyor</h2>
        <p id="room-info" class="text-blue-500 text-[10px] font-bold mt-2"></p>
        <button onclick="cancelMatch()" class="mt-10 text-red-600 text-[10px] font-bold uppercase tracking-widest">İptal Et</button>
    </div>

    <div id="game-page" class="page">
        <div class="flex justify-between items-center mb-4">
            <div class="text-center"><p class="text-[8px] text-gray-500 uppercase">SEN</p><span id="my-score" class="text-4xl font-black">0</span></div>
            <div class="text-center text-red-600"><p class="text-[8px] uppercase">SÜRE</p><span id="game-time" class="text-2xl font-black">30</span></div>
            <div class="text-center"><p id="opp-name" class="text-[8px] text-gray-500 uppercase">RAKİP</p><span id="opp-score" class="text-4xl font-black">0</span></div>
        </div>
        <div id="game-area"></div>
        <div class="flex justify-around mt-10">
            <button onclick="sendEmoji('🔥')" class="text-3xl">🔥</button>
            <button onclick="sendEmoji('😂')" class="text-3xl">😂</button>
            <button onclick="sendEmoji('😡')" class="text-3xl">😡</button>
        </div>
    </div>

    <div id="deposit-modal" class="fixed inset-0 bg-black/90 z-[150] hidden flex-col justify-center items-center p-5">
        <div class="card w-full max-w-xs">
            <h2 class="font-black mb-4">ELMAS YÜKLE</h2>
            <input id="dep-amount" type="number" placeholder="Miktar" class="input-field">
            <button onclick="submitDeposit()" class="btn btn-blue text-sm">TALEP GÖNDER</button>
            <button onclick="closeModal('deposit-modal')" class="w-full mt-4 text-xs text-gray-500">KAPAT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCpBrkM6Yh__FXhc8aznEp1G2AqMgxr_iE", 
            authDomain: "arenav14-8ad95.firebaseapp.com", 
            projectId: "arenav14-8ad95", 
            storageBucket: "arenav14-8ad95.firebasestorage.app", 
            messagingSenderId: "818899825621", 
            appId: "1:818899825621:web:a51cd631c943863fcb435c", 
            databaseURL: "https://arenav14-8ad95-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();

        const bots = ["Arda_01", "Selin_X", "Murat_Bey", "Ceren_Ada", "Hakan_TR", "Gamze_33", "Mert_Aslan", "Polat_V"];
        let uUid, uData, isS = false, isP = false, gId, mKey, curRoom;
        let tLeft = 30, gInt, tInt;

        function handleLogin() {
            const e = document.getElementById('l-email').value; const p = document.getElementById('l-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => showToast("Hata!", "error"));
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        function startLobby() {
            uUid = auth.currentUser.uid;
            showPage('lobby-page');
            db.ref('users/' + uUid).on('value', s => {
                uData = s.val();
                if(uData) {
                    document.getElementById('display-name').innerText = uData.username;
                    document.getElementById('user-diamonds').innerText = (uData.diamonds || 0).toLocaleString();
                }
            });
            db.ref('system/rooms').on('value', s => {
                let h = ''; s.forEach(c => {
                    const r = c.val();
                    h += `<div onclick="joinMatch('${c.key}',${r.entryFee},${r.reward},'${r.name}')" class="card flex justify-between items-center active:scale-95 cursor-pointer"><div><p class="font-black text-sm uppercase">${r.name}</p><p class="text-[10px] text-blue-500">${r.entryFee} 💎</p></div><i class="fa-solid fa-play text-gray-700"></i></div>`;
                });
                document.getElementById('rooms-list').innerHTML = h;
            });
            db.ref('system/active_players/' + uUid + '/game').on('value', s => { if(s.val() && !isP) startGame(s.val()); });
        }

        function joinMatch(rid, entry, reward, name) {
            if(isS || isP) return;
            if((uData.diamonds || 0) < entry) return showToast("Yetersiz Bakiye", "error");
            isS = true; curRoom = { rid, entry, reward };
            db.ref('users/' + uUid + '/diamonds').transaction(v => v - entry);
            document.getElementById('match-overlay').style.display = 'flex';
            document.getElementById('room-info').innerText = name;
            
            // 4 saniye sonra kimse gelmezse botu salla
            setTimeout(() => { if(isS && !isP) startBotGame(entry, reward); }, 4000);
        }

        function startBotGame(entry, reward) {
            const gid = 'bot_' + Date.now();
            const bN = bots[Math.floor(Math.random() * bots.length)];
            db.ref('system/games/' + gid).set({
                p1: uUid, p1Name: uData.username, p1Score: 0,
                p2: 'BOT', p2Name: bN, p2Score: 0,
                entry, reward, status: 'playing', isBot: true
            }).then(() => db.ref('system/active_players/' + uUid + '/game').set(gid));
        }

        function cancelMatch() {
            if(!isS) return;
            db.ref('users/' + uUid + '/diamonds').transaction(v => (v || 0) + curRoom.entry);
            location.reload();
        }

        function startGame(gid) {
            isP = true; isS = false; gId = gid;
            document.getElementById('match-overlay').style.display = 'none';
            showPage('game-page'); tLeft = 30;

            db.ref('system/games/' + gid).on('value', s => {
                const g = s.val(); if(!g) return;
                mKey = (uUid === g.p1) ? 'p1Score' : 'p2Score';
                document.getElementById('my-score').innerText = g[mKey];
                document.getElementById('opp-score').innerText = (mKey === 'p1Score') ? g.p2Score : g.p1Score;
                document.getElementById('opp-name').innerText = (mKey === 'p1Score') ? g.p2Name : g.p1Name;
            });

            gInt = setInterval(() => {
                tLeft--; document.getElementById('game-time').innerText = tLeft;
                if(tLeft <= 0) finishGame();
                // BOT SİNSİ PUAN KAZANMA
                db.ref('system/games/'+gid).once('value', sn => {
                    const g = sn.val();
                    if(g && g.isBot && Math.random() < 0.35) {
                        db.ref('system/games/'+gid+'/p2Score').transaction(v => v + 1);
                    }
                });
            }, 1000);
            tInt = setInterval(spawn, 800);
        }

        function spawn() {
            const a = document.getElementById('game-area'); const t = document.createElement('div');
            const isG = Math.random() < 0.15; t.className = isG ? 'target golden' : 'target';
            t.style.left = Math.random() * (a.clientWidth - 50) + 'px';
            t.style.top = Math.random() * (a.clientHeight - 50) + 'px';
            t.onclick = () => { db.ref('system/games/' + gId + '/' + mKey).transaction(v => v + (isG ? 3 : 1)); t.remove(); };
            a.appendChild(t); setTimeout(() => t.remove(), 1000);
        }

        function finishGame() {
            clearInterval(gInt); clearInterval(tInt);
            db.ref('system/games/' + gId).once('value', s => {
                let g = s.val(); if(!g) return;
                let mS = g[mKey]; let oS = (mKey === 'p1Score') ? g.p2Score : g.p1Score;
                
                // %80 BOT GALİBİYETİ (HİSSETTİRMEDEN)
                if(g.isBot && Math.random() < 0.80 && mS >= oS) { oS = mS + 1; }

                const win = mS > oS;
                if(win) { db.ref('users/' + uUid + '/diamonds').transaction(v => (v || 0) + g.reward); }
                else if(g.isBot) { db.ref('system/accounting/commission').transaction(v => (v || 0) + (g.entry * 2)); }
                
                db.ref('system/active_players/' + uUid).remove(); isP = false;
                setTimeout(() => { showPage('lobby-page'); showToast(win ? "KAZANDIN" : "KAYBETTİN", win ? "success" : "error"); }, 1500);
            });
        }

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        function showToast(m, t) {
            const c = document.getElementById('toast-container');
            const e = document.createElement('div'); e.className = `p-3 px-10 rounded-full font-bold text-xs ${t=='success'?'bg-blue-600':'bg-red-600'}`;
            e.innerText = m; c.appendChild(e); setTimeout(() => e.remove(), 2500);
        }
        function submitDeposit() { const a = document.getElementById('dep-amount').value; if(a) { db.ref('system/deposit_requests').push({ uid: uUid, name: uData.username, amount: parseInt(a) }); closeModal('deposit-modal'); showToast("Talep Gönderildi", "success"); } }

        auth.onAuthStateChanged(u => { if(u) startLobby(); else showPage('auth-page'); });
    </script>
</body>
</html>
