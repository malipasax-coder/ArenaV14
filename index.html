<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA V14 | ULTIMATE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; user-select: none; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .page { position: fixed; inset: 0; padding: 1rem; overflow-y: auto; z-index: 10; padding-bottom: 80px; background: radial-gradient(circle at top, #0f172a 0%, #020617 100%); }
        .hidden { display: none !important; }
        .input-field { width: 100%; background: rgba(15, 23, 42, 0.9); padding: 0.8rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; }
        .stat-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9)); border-radius: 20px; padding: 1.2rem; border: 1px solid rgba(255,255,255,0.05); }
        
        #game-area { position: relative; width: 100%; height: 50vh; background: rgba(0,0,0,0.5); border-radius: 24px; border: 2px solid #1e293b; overflow: hidden; }
        .target { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, #60a5fa, #2563eb); border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 20px #3b82f6; transform: scale(0); animation: pop 0.2s forwards; }
        @keyframes pop { to { transform: scale(1); } }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; }
        .toast { padding: 12px; border-radius: 10px; margin-bottom: 8px; font-weight: bold; animation: slideIn 0.3s forwards; color: white; text-align: center; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="matchmaking-overlay" class="fixed inset-0 bg-black/95 z-[200] hidden flex flex-col justify-center items-center p-6 text-center">
        <div class="w-20 h-20 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 class="text-2xl font-black font-orbitron mb-2">RAKİP ARANIYOR...</h2>
        <p id="match-room-info" class="text-blue-400 text-sm mb-8"></p>
        <button onclick="cancelMatchmaking()" class="bg-red-600 px-8 py-3 rounded-xl font-bold">İPTAL ET</button>
    </div>

    <div id="admin-page" class="page hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black font-orbitron text-purple-500">ADMIN PANEL</h1>
            <button onclick="logout()" class="text-red-500"><i class="fa-solid fa-power-off text-xl"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="stat-card border-l-4 border-green-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase">Sistem Kasası</p>
                <h3 id="admin-sys-commission" class="text-lg font-black font-orbitron">0 ₺</h3>
            </div>
            <div class="stat-card border-l-4 border-blue-500">
                <p class="text-[9px] text-slate-400 font-bold uppercase">Toplam Üye</p>
                <h3 id="admin-total-users" class="text-lg font-black font-orbitron">0</h3>
            </div>
        </div>
        <div class="space-y-4">
            <div class="stat-card border-orange-500/30">
                <h3 class="text-orange-400 font-bold text-sm mb-3"><i class="fa-solid fa-clock-rotate-left mr-2"></i> ÇEKİM TALEPLERİ</h3>
                <div id="admin-withdraw-list" class="space-y-2 text-xs"></div>
            </div>
            <div class="stat-card border-blue-500/30">
                <h3 class="text-blue-400 font-bold text-sm mb-3"><i class="fa-solid fa-users mr-2"></i> OYUNCU YÖNETİMİ</h3>
                <div id="admin-users-cards" class="space-y-2"></div>
            </div>
            <div class="stat-card border-purple-500/30">
                <h3 class="text-purple-400 font-bold text-sm mb-3"><i class="fa-solid fa-plus mr-2"></i> ODA KUR</h3>
                <input id="new-room-name" placeholder="Oda Adı" class="input-field mb-2 text-sm">
                <div class="flex gap-2">
                    <input id="new-room-entry" type="number" placeholder="Giriş" class="input-field text-sm">
                    <input id="new-room-reward" type="number" placeholder="Ödül" class="input-field text-sm">
                </div>
                <button onclick="adminCreateRoom()" class="w-full bg-purple-600 mt-3 py-3 rounded-xl font-bold text-sm">YAYINLA</button>
            </div>
        </div>
    </div>

    <div id="lobby-page" class="page hidden">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">A</div>
                <h2 id="display-name" class="font-bold text-sm uppercase">...</h2>
            </div>
            <button onclick="logout()" class="text-slate-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="stat-card mb-6 border-b-4 border-cyan-500 bg-cyan-500/5 py-8 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Cüzdan Bakiyesi</p>
            <h1 id="user-diamonds" class="text-4xl font-black font-orbitron text-cyan-400">0 ₺</h1>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="showWithdrawModal()" class="stat-card bg-emerald-500/10 border-emerald-500/20 text-center">
                <i class="fa-solid fa-money-bill-transfer text-emerald-500 mb-1"></i>
                <p class="text-[10px] font-bold">PARA ÇEK</p>
            </button>
            <button onclick="showPage('store-page')" class="stat-card bg-blue-500/10 border-blue-500/20 text-center">
                <i class="fa-solid fa-gem text-blue-500 mb-1"></i>
                <p class="text-[10px] font-bold">KASA YÜKLE</p>
            </button>
        </div>
        <h3 class="text-slate-500 font-bold text-[10px] mb-3 uppercase tracking-widest">Canlı 1v1 Odaları</h3>
        <div id="rooms-list" class="space-y-3"></div>
    </div>

    <div id="game-page" class="page hidden">
        <div class="flex justify-between items-center mb-4 glass p-3 rounded-xl">
            <div class="text-center">
                <p class="text-[9px] text-blue-400 font-bold">BEN</p>
                <span id="my-score" class="text-2xl font-black">0</span>
            </div>
            <div class="text-center">
                <p class="text-[9px] text-red-500 font-bold">SÜRE</p>
                <span id="game-time" class="text-xl font-orbitron">30</span>
            </div>
            <div class="text-center">
                <p id="opp-name" class="text-[9px] text-red-400 font-bold">RAKİP</p>
                <span id="opp-score" class="text-2xl font-black">0</span>
            </div>
        </div>
        <div id="game-area"></div>
    </div>

    <div id="withdraw-modal" class="fixed inset-0 bg-black/90 z-[300] hidden flex items-center justify-center p-6">
        <div class="glass p-6 rounded-3xl w-full border-emerald-500/30">
            <h2 class="text-lg font-black font-orbitron text-emerald-400 mb-4">PARA ÇEK</h2>
            <input id="w-name" placeholder="Ad Soyad" class="input-field mb-2">
            <input id="w-iban" placeholder="IBAN (TR...)" class="input-field mb-2">
            <input id="w-amount" type="number" placeholder="Miktar (₺)" class="input-field mb-4">
            <div class="flex gap-2">
                <button onclick="closeWithdrawModal()" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold">İPTAL</button>
                <button onclick="submitWithdraw()" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold">GÖNDER</button>
            </div>
        </div>
    </div>

    <div id="store-page" class="page hidden">
        <button onclick="showPage('lobby-page')" class="mb-6 text-slate-400"><i class="fa-solid fa-arrow-left"></i> Geri</button>
        <h2 class="text-2xl font-black mb-6">KASA YÜKLE</h2>
        <div class="space-y-3">
            <div onclick="purchase(1000)" class="stat-card border-blue-500/50 flex justify-between items-center">
                <span class="font-bold">1.000 ₺ Yükle</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
            <div onclick="purchase(5000)" class="stat-card border-purple-500/50 flex justify-between items-center">
                <span class="font-bold">5.000 ₺ Yükle</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <div id="auth-page" class="page flex flex-col justify-center items-center">
        <h1 class="text-4xl font-black font-orbitron text-blue-500 mb-8">ARENA V14</h1>
        <div class="glass p-6 rounded-3xl w-full max-w-xs">
            <input id="l-user" placeholder="Kullanıcı Adı" class="input-field mb-2">
            <input id="l-pass" type="password" placeholder="Şifre" class="input-field mb-4">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mb-2">GİRİŞ</button>
            <button onclick="handleRegister()" class="w-full border border-blue-500 text-blue-500 py-3 rounded-xl font-bold">KAYIT</button>
        </div>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCpBrkM6Yh__FXhc8aznEp1G2AqMgxr_iE",
            authDomain: "arenav14-8ad95.firebaseapp.com",
            projectId: "arenav14-8ad95",
            storageBucket: "arenav14-8ad95.firebasestorage.app",
            messagingSenderId: "818899825621",
            appId: "1:818899825621:web:a51cd631c943863fcb435c",
            databaseURL: "https://arenav14-8ad95-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserUid = null, userData = {}, isAdmin = false;
        let gameInterval, targetInterval, timeLeft = 30, currentGameId = null, myKey = null, currentMatchRoom = null;

        function showToast(m, t='info') {
            const el = document.createElement('div');
            el.className = `toast bg-${t === 'error' ? 'red' : 'blue'}-600`;
            el.innerText = m;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // AUTH
        function handleLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "123456") { isAdmin = true; startAdmin(); return; }
            auth.signInWithEmailAndPassword(u + "@a.v14", p).then(() => startLobby()).catch(() => showToast("Hata!", "error"));
        }
        function handleRegister() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const p = document.getElementById('l-pass').value;
            auth.createUserWithEmailAndPassword(u + "@a.v14", p).then(r => {
                db.ref('users/' + r.user.uid).set({ username: u, diamonds: 1000, wins: 0, losses: 0 });
                showToast("Kayıt Başarılı!");
            }).catch(e => showToast(e.message, "error"));
        }
        function logout() { auth.signOut().then(() => location.reload()); }

        // ADMIN
        function startAdmin() {
            showPage('admin-page');
            db.ref('system/accounting/commission').on('value', s => document.getElementById('admin-sys-commission').innerText = (s.val() || 0) + " ₺");
            db.ref('users').on('value', s => {
                document.getElementById('admin-total-users').innerText = s.numChildren();
                let h = '';
                s.forEach(c => {
                    const u = c.val();
                    h += `<div class="stat-card flex justify-between items-center text-xs">
                        <span><b>${u.username.toUpperCase()}</b>: ${u.diamonds} ₺</span>
                        <div class="flex gap-1">
                            <button onclick="db.ref('users/${c.key}/diamonds').transaction(v=>(v||0)+500)" class="bg-green-600 p-1 rounded">+500</button>
                            <button onclick="db.ref('users/${c.key}/diamonds').transaction(v=>(v||0)-500)" class="bg-red-600 p-1 rounded">-500</button>
                        </div>
                    </div>`;
                });
                document.getElementById('admin-users-cards').innerHTML = h;
            });
            db.ref('system/withdraw_requests').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const r = c.val();
                    h += `<div class="stat-card border-l-2 border-orange-500 bg-orange-500/5 p-2">
                        <p><b>${r.name}</b> - ${r.amount} ₺</p>
                        <p class="text-[8px] font-mono">${r.iban}</p>
                        <button onclick="db.ref('system/withdraw_requests/${c.key}').remove()" class="w-full bg-orange-600 mt-1 rounded py-1">ÖDENDİ</button>
                    </div>`;
                });
                document.getElementById('admin-withdraw-list').innerHTML = h || 'Talep yok.';
            });
        }
        function adminCreateRoom() {
            const n = document.getElementById('new-room-name').value;
            const e = parseInt(document.getElementById('new-room-entry').value);
            const r = parseInt(document.getElementById('new-room-reward').value);
            if(n && e && r) db.ref('system/rooms').push({ name: n, entryFee: e, reward: r });
        }

        // LOBBY & MATCHMAKING
        function startLobby() {
            currentUserUid = auth.currentUser.uid;
            showPage('lobby-page');
            db.ref('users/' + currentUserUid).on('value', s => {
                userData = s.val();
                document.getElementById('display-name').innerText = userData.username;
                document.getElementById('user-diamonds').innerText = userData.diamonds.toLocaleString() + " ₺";
            });
            db.ref('system/rooms').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const r = c.val();
                    h += `<div onclick="joinMatch('${c.key}', ${r.entryFee}, ${r.reward}, '${r.name}')" class="stat-card border-l-4 border-blue-500 flex justify-between items-center">
                        <div><p class="font-bold text-sm">${r.name}</p><p class="text-[9px] text-slate-400">${r.entryFee} ₺ Giriş</p></div>
                        <i class="fa-solid fa-play text-blue-500"></i>
                    </div>`;
                });
                document.getElementById('rooms-list').innerHTML = h;
            });
            // Oyun Başlangıç Dinleyici
            db.ref(`system/active_players/${currentUserUid}/game`).on('value', s => { if(s.val()) startGame(s.val()); });
        }

        function joinMatch(rid, entry, reward, name) {
            if(userData.diamonds < entry) return showToast("Bakiye Yetersiz!", "error");
            currentMatchRoom = { rid, entry };
            document.getElementById('match-room-info').innerText = name;
            document.getElementById('matchmaking-overlay').classList.remove('hidden');

            db.ref(`system/matchmaking/${rid}`).transaction(cur => {
                if(!cur) return { uid: currentUserUid, name: userData.username, status: 'waiting', entry, reward };
                if(cur.status === 'waiting' && cur.uid !== currentUserUid) {
                    cur.status = 'matched';
                    cur.p2 = { uid: currentUserUid, name: userData.username };
                    return cur;
                }
                return;
            }, (err, comm, snap) => {
                if(comm && snap.val()) {
                    const d = snap.val();
                    if(d.status === 'matched' && d.p2.uid === currentUserUid) {
                        const gid = 'g_'+Date.now();
                        db.ref(`system/games/${gid}`).set({
                            p1: d.uid, p1Name: d.name, p1Score: 0,
                            p2: d.p2.uid, p2Name: d.p2.name, p2Score: 0,
                            entry, reward, status: 'playing'
                        }).then(() => {
                            db.ref(`system/active_players/${d.uid}/game`).set(gid);
                            db.ref(`system/active_players/${d.p2.uid}/game`).set(gid);
                            db.ref(`system/matchmaking/${rid}`).remove();
                        });
                    }
                }
            });
        }

        function cancelMatchmaking() {
            db.ref(`system/matchmaking/${currentMatchRoom.rid}`).remove();
            document.getElementById('matchmaking-overlay').classList.add('hidden');
        }

        // GAME LOGIC
        function startGame(gid) {
            currentGameId = gid;
            document.getElementById('matchmaking-overlay').classList.add('hidden');
            showPage('game-page');
            document.getElementById('game-area').innerHTML = "";
            timeLeft = 30;
            
            db.ref(`system/games/${gid}`).on('value', s => {
                const g = s.val(); if(!g) return;
                myKey = (currentUserUid === g.p1) ? 'p1Score' : 'p2Score';
                document.getElementById('my-score').innerText = g[myKey];
                document.getElementById('opp-score').innerText = (myKey === 'p1Score') ? g.p2Score : g.p1Score;
                document.getElementById('opp-name').innerText = (myKey === 'p1Score') ? g.p2Name : g.p1Name;
            });

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('game-time').innerText = timeLeft;
                if(timeLeft <= 0) finishGame();
            }, 1000);
            spawn();
            targetInterval = setInterval(spawn, 700);
        }

        function spawn() {
            const a = document.getElementById('game-area');
            const t = document.createElement('div');
            t.className = 'target';
            t.style.left = Math.random() * (a.clientWidth - 60) + 'px';
            t.style.top = Math.random() * (a.clientHeight - 60) + 'px';
            t.onmousedown = () => {
                db.ref(`system/games/${currentGameId}/${myKey}`).transaction(v => (v || 0) + 1);
                t.remove();
            };
            a.appendChild(t);
            setTimeout(() => t.remove(), 1000);
        }

        function finishGame() {
            clearInterval(gameInterval); clearInterval(targetInterval);
            db.ref(`system/games/${currentGameId}`).once('value', s => {
                const g = s.val(); if(!g) return;
                const myS = g[myKey], oppS = (myKey === 'p1Score') ? g.p2Score : g.p1Score;
                const cut = (g.entry * 2) - g.reward;

                db.ref(`users/${currentUserUid}/diamonds`).transaction(cur => {
                    if(myS > oppS) return (cur || 0) - g.entry + g.reward;
                    if(myS < oppS) return (cur || 0) - g.entry;
                    return cur;
                });

                if(myS > oppS) {
                    showToast("KAZANDIN! Ödül Yattı.");
                    db.ref('system/accounting/commission').transaction(v => (v || 0) + cut);
                } else if(myS < oppS) {
                    showToast("KAYBETTİN!", "error");
                    db.ref('system/accounting/commission').transaction(v => (v || 0) + cut);
                } else {
                    showToast("BERABERE!");
                }
                db.ref(`system/active_players/${currentUserUid}/game`).remove();
                setTimeout(() => showPage('lobby-page'), 2000);
            });
        }

        // UTILS
        function showWithdrawModal() { document.getElementById('withdraw-modal').classList.remove('hidden'); }
        function closeWithdrawModal() { document.getElementById('withdraw-modal').classList.add('hidden'); }
        function submitWithdraw() {
            const n = document.getElementById('w-name').value, i = document.getElementById('w-iban').value, a = parseInt(document.getElementById('w-amount').value);
            if(a >= 500 && userData.diamonds >= a) {
                db.ref('system/withdraw_requests').push({ name: n, iban: i, amount: a, uid: currentUserUid });
                db.ref(`users/${currentUserUid}/diamonds`).transaction(v => v - a);
                showToast("Talep Alındı."); closeWithdrawModal();
            } else showToast("Hata!", "error");
        }
        function purchase(a) { db.ref(`users/${currentUserUid}/diamonds`).transaction(v => (v || 0) + a); showToast("Yüklendi!"); }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        auth.onAuthStateChanged(u => { if(u && !isAdmin) startLobby(); else if(!isAdmin) showPage('auth-page'); });
    </script>
</body>
</html>
